spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${keycloak.auth-server-url}/realms/${keycloak.realm}

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: gateway-service
              uri: lb://gateway-service
              predicates:
                - Path=/api/v1/authenticate

            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers, /api/v1/customers/**

            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/v1/accounts, /api/v1/accounts/**

            - id: operation-service
              uri: lb://operation-service
              predicates:
                - Path=/api/v1/operations, /api/v1/operations/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

keycloak:
  auth-server-url: http://localhost:8181
  realm: ebanking-realm
  client-id: ebanking-client
