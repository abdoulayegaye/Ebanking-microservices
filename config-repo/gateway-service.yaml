spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/v1/customers, /api/v1/customers/**

            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/v1/accounts, /api/v1/accounts/**

            - id: operation-service
              uri: lb://operation-service
              predicates:
                - Path=/api/v1/operations, /api/v1/operations/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka